name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Premake5
      uses: Jarod42/install-premake5@v7
    
    - name: Generate build files with Premake
      run: premake5 gmake
    
    - name: Build with make
      run: make config=release
